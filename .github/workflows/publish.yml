name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: windows-latest
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore kitsune.slnx

      - name: Build
        run: dotnet build kitsune.slnx --no-restore -c Release

      - name: Test
        run: dotnet test kitsune.slnx --no-build -c Release --verbosity normal

      - name: Pack
        run: dotnet pack kitsune.slnx --no-build -c Release -o ./artifacts/packages

      - name: NuGet login (OIDC)
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to NuGet
        shell: pwsh
        run: |
          $apiKey = '${{ steps.login.outputs.NUGET_API_KEY }}'
          $source = 'https://api.nuget.org/v3/index.json'
          Get-ChildItem ./artifacts/packages/*.nupkg | ForEach-Object {
            dotnet nuget push $_.FullName --api-key $apiKey --source $source --skip-duplicate
          }

      - name: Push symbols to NuGet
        shell: pwsh
        run: |
          $apiKey = '${{ steps.login.outputs.NUGET_API_KEY }}'
          $source = 'https://api.nuget.org/v3/index.json'
          Get-ChildItem ./artifacts/packages/*.snupkg | ForEach-Object {
            dotnet nuget push $_.FullName --api-key $apiKey --source $source --skip-duplicate
          }