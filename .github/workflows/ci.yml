name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore kitsune.slnx

      - name: Build
        run: dotnet build kitsune.slnx --no-restore -c Release

      - name: Test
        run: dotnet test kitsune.slnx --no-build -c Release --verbosity normal

      - name: Format check
        run: dotnet format kitsune.slnx --verify-no-changes